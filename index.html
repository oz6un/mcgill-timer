<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" id="meta-theme" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>McGill Big 3 Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #111318;
    --fg: #f0f0f0;
    --fg-dim: rgba(255,255,255,0.4);
    --accent: #4ecca3;

    --hold-bg: #0a2e1a;
    --hold-fg: #00ff7f;
    --rest-bg: #2e1f0a;
    --rest-fg: #ffb830;
    --trans-bg: #0a1a2e;
    --trans-fg: #5090ff;
    --done-bg: #1e0a2e;
    --done-fg: #c060ff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.4s;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  body.state-work       { background: var(--hold-bg); }
  body.state-rest       { background: var(--rest-bg); }
  body.state-transition { background: var(--trans-bg); }
  body.state-done       { background: var(--done-bg); }

  /* ── Animations ────────────────────────────────── */
  @keyframes pop {
    0%   { transform: scale(0.88); opacity: 0.6; }
    50%  { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.5; transform: scale(1.06); }
  }

  @keyframes fade-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .pop { animation: pop 0.3s ease-out; }
  .urgent { animation: pulse 0.6s ease-in-out infinite; }

  /* ── Start screen ──────────────────────────────── */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(1.2rem, 4vh, 2rem);
    padding: 1.5rem;
    animation: fade-in 0.5s ease-out;
  }

  h1 {
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    font-weight: 800;
    letter-spacing: -1px;
    text-align: center;
  }

  .subtitle {
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    opacity: 0.4;
    margin-top: 0.2rem;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 3px;
  }

  .exercise-list {
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
    padding: 0.8rem 1.4rem;
    border-radius: 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-size: clamp(0.82rem, 2.5vw, 0.95rem);
    opacity: 0.7;
    text-align: center;
    line-height: 1.6;
  }

  .config-row {
    font-size: clamp(0.82rem, 2.5vw, 0.95rem);
    opacity: 0.5;
    text-align: center;
  }

  .est-time {
    font-size: clamp(0.9rem, 2.8vw, 1.05rem);
    opacity: 0.35;
  }

  .big-btn {
    width: clamp(120px, 34vw, 160px);
    height: clamp(120px, 34vw, 160px);
    border-radius: 50%;
    border: 3px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: clamp(1.2rem, 3.5vw, 1.5rem);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 3px;
  }

  .big-btn:active {
    transform: scale(0.93);
    background: var(--accent);
    color: var(--bg);
  }

  /* ── Timer screen ──────────────────────────────── */
  #timer-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    position: relative;
    cursor: pointer;
    padding: 0.5rem 1rem;
  }

  /* Round pill — top */
  #round-pill {
    font-size: clamp(0.7rem, 2.2vw, 0.85rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.4;
    padding: 0.25rem 0.8rem;
    border-radius: 100px;
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: clamp(0.5rem, 2vh, 1.2rem);
  }

  /* Exercise name */
  #exercise-name {
    font-size: clamp(1.3rem, 5vw, 2rem);
    font-weight: 700;
    text-align: center;
    min-height: 1.8rem;
    margin-bottom: clamp(0.2rem, 1vh, 0.5rem);
    transition: font-size 0.3s;
  }

  /* During transition, exercise name is the hero */
  body.state-transition #exercise-name {
    font-size: clamp(1.8rem, 7vw, 3rem);
    color: var(--trans-fg);
  }

  /* THE NUMBER — massive, hero element */
  #timer-number {
    font-size: clamp(7rem, 28vw, 14rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    line-height: 1;
    letter-spacing: -2px;
    text-shadow: 0 2px 30px rgba(0,0,0,0.3);
    transition: color 0.4s;
    margin: clamp(0rem, 1vh, 0.3rem) 0;
  }

  body.state-work #timer-number       { color: var(--fg); }
  body.state-rest #timer-number       { color: var(--rest-fg); }
  body.state-transition #timer-number {
    color: var(--fg-dim);
    font-size: clamp(4rem, 16vw, 8rem);
  }

  /* Phase label */
  #phase-label {
    font-size: clamp(1rem, 3.5vw, 1.4rem);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 5px;
    transition: color 0.4s;
    margin-bottom: clamp(0.3rem, 1vh, 0.6rem);
  }

  body.state-work #phase-label       { color: var(--hold-fg); }
  body.state-rest #phase-label       { color: var(--rest-fg); }
  body.state-transition #phase-label { color: var(--trans-fg); }

  /* Rep info */
  #rep-info {
    font-size: clamp(0.85rem, 2.8vw, 1.05rem);
    opacity: 0.5;
    min-height: 1.2rem;
    margin-bottom: clamp(0.3rem, 1.5vh, 0.8rem);
  }

  /* Exercise segment bar */
  #segments {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    margin-bottom: clamp(0.5rem, 2vh, 1rem);
  }

  .seg {
    width: clamp(28px, 10vw, 48px);
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .seg.done { background: rgba(255,255,255,0.35); }

  .seg.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  body.state-work .seg.active       { background: var(--hold-fg); box-shadow: 0 0 10px var(--hold-fg); }
  body.state-rest .seg.active       { background: var(--rest-fg); box-shadow: 0 0 10px var(--rest-fg); }
  body.state-transition .seg.active { background: var(--trans-fg); box-shadow: 0 0 10px var(--trans-fg); }

  /* Controls */
  .controls {
    display: flex;
    gap: 1rem;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--fg);
    width: 46px;
    height: 46px;
    border-radius: 50%;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    opacity: 0.6;
  }

  .ctrl-btn:active {
    background: rgba(255,255,255,0.15);
    opacity: 1;
  }

  /* Pause overlay */
  #pause-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.7);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 10;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  #pause-overlay.visible { display: flex; }

  #pause-overlay .pause-text {
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  #pause-overlay .pause-hint {
    font-size: clamp(0.75rem, 2.2vw, 0.9rem);
    opacity: 0.3;
  }

  /* Progress bar — thick, bottom */
  #progress-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 8px;
    background: rgba(255,255,255,0.04);
  }

  #progress-bar {
    height: 100%;
    width: 0%;
    transition: width 0.3s linear, background 0.4s;
  }

  body.state-work #progress-bar       { background: var(--hold-fg); }
  body.state-rest #progress-bar       { background: var(--rest-fg); }
  body.state-transition #progress-bar { background: var(--trans-fg); }
  body.state-done #progress-bar       { background: var(--done-fg); }

  /* ── Done screen ───────────────────────────────── */
  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(1.5rem, 4vh, 2.5rem);
    padding: 1.5rem;
    animation: fade-in 0.5s ease-out;
  }

  .done-check {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 4px solid var(--done-fg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.2rem;
    color: var(--done-fg);
  }

  #done-msg {
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    font-weight: 800;
    text-align: center;
    color: var(--done-fg);
  }

  .done-stats {
    text-align: center;
    opacity: 0.5;
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    line-height: 1.8;
  }

  /* ── Landscape tweak ───────────────────────────── */
  @media (orientation: landscape) and (max-height: 500px) {
    #timer-number { font-size: clamp(4rem, 18vh, 8rem); }
    #exercise-name { font-size: clamp(1rem, 3.5vh, 1.5rem); }
    body.state-transition #exercise-name { font-size: clamp(1.3rem, 5vh, 2rem); }
    body.state-transition #timer-number { font-size: clamp(2.5rem, 10vh, 5rem); }
    #round-pill { margin-bottom: 0.3rem; }
    #segments { margin-bottom: 0.3rem; }
    .controls { margin-top: 0; }
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <div>
    <h1>McGill Big 3</h1>
    <div class="subtitle">Pyramid Timer</div>
  </div>
  <div class="exercise-list">
    <div>Curl-up</div>
    <div>Side Plank (Left / Right)</div>
    <div>Bird Dog (Left / Right)</div>
  </div>
  <div class="config-row">10s hold · 5s rest · 6 → 4 → 2 reps</div>
  <div class="est-time" id="est-time"></div>
  <button class="big-btn" id="btn-start">START</button>
</div>

<!-- Timer Screen -->
<div id="timer-screen">
  <div id="round-pill"></div>
  <div id="exercise-name"></div>
  <div id="timer-number">10</div>
  <div id="phase-label"></div>
  <div id="rep-info"></div>
  <div id="segments"></div>
  <div class="controls">
    <button class="ctrl-btn" id="btn-pause" title="Pause">⏸</button>
    <button class="ctrl-btn" id="btn-reset" title="Reset">⏹</button>
  </div>

  <div id="pause-overlay">
    <div class="pause-text">Paused</div>
    <div class="pause-hint">Tap to resume</div>
  </div>

  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>
</div>

<!-- Done Screen -->
<div id="done-screen">
  <div class="done-check">&#10003;</div>
  <div id="done-msg">Done!</div>
  <div class="done-stats" id="done-stats"></div>
  <button class="big-btn" id="btn-again">AGAIN</button>
</div>

<script>
// ── Config ──────────────────────────────────────────
const EXERCISES = [
  'Curl-up',
  'Side Plank (Left)',
  'Side Plank (Right)',
  'Bird Dog (Left)',
  'Bird Dog (Right)',
];
const SETS = [6, 4, 2];
const WORK_SEC = 10;
const REST_SEC = 5;
const TRANSITION_SEC = 10;

const THEME_COLORS = {
  work: '#0a2e1a',
  rest: '#2e1f0a',
  transition: '#0a1a2e',
  done: '#1e0a2e',
};

// ── Build step list ─────────────────────────────────
function buildSteps() {
  const steps = [];
  for (let si = 0; si < SETS.length; si++) {
    const repCount = SETS[si];
    for (let ei = 0; ei < EXERCISES.length; ei++) {
      const ex = EXERCISES[ei];
      steps.push({
        type: 'transition', duration: TRANSITION_SEC,
        exercise: ex, round: repCount, rep: 1, repTotal: repCount, exIndex: ei,
      });
      for (let r = 1; r <= repCount; r++) {
        steps.push({
          type: 'work', duration: WORK_SEC,
          exercise: ex, round: repCount, rep: r, repTotal: repCount, exIndex: ei,
        });
        if (r < repCount) {
          steps.push({
            type: 'rest', duration: REST_SEC,
            exercise: ex, round: repCount, rep: r, repTotal: repCount, exIndex: ei,
          });
        }
      }
    }
  }
  return steps;
}

function buildCumulativeMs(steps) {
  const cum = new Float64Array(steps.length + 1);
  for (let i = 0; i < steps.length; i++) {
    cum[i + 1] = cum[i] + steps[i].duration * 1000;
  }
  return cum;
}

function formatTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function estimateTotal() {
  const s = buildSteps();
  return Math.round(s.reduce((sum, step) => sum + step.duration, 0));
}

function totalHolds() {
  return SETS.reduce((sum, n) => sum + n, 0) * EXERCISES.length;
}

// ── Audio ───────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, duration, vol = 0.3) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.value = vol;
  gain.gain.setTargetAtTime(0, audioCtx.currentTime + duration / 1000 * 0.8, 0.015);
  osc.start();
  osc.stop(audioCtx.currentTime + duration / 1000);
}

function beepWork()       { beep(880, 200, 0.35); }
function beepRest()       { beep(440, 200, 0.25); }
function beepTick()       { beep(1000, 60, 0.15); }
function beepTransition() {
  beep(523, 150, 0.3);
  setTimeout(() => beep(659, 150, 0.3), 180);
  setTimeout(() => beep(784, 200, 0.3), 360);
}
function beepDone() {
  beep(784, 200, 0.3);
  setTimeout(() => beep(988, 200, 0.3), 220);
  setTimeout(() => beep(1175, 300, 0.35), 440);
}

// ── Vibration ───────────────────────────────────────
function vibrate(pattern) {
  if ('vibrate' in navigator) navigator.vibrate(pattern);
}

// ── Speech ──────────────────────────────────────────
function speak(text) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.1;
    u.volume = 1;
    speechSynthesis.speak(u);
  }
}
function stopSpeech() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

// ── DOM refs ────────────────────────────────────────
const $startScreen   = document.getElementById('start-screen');
const $timerScreen   = document.getElementById('timer-screen');
const $doneScreen    = document.getElementById('done-screen');
const $exerciseName  = document.getElementById('exercise-name');
const $phaseLabel    = document.getElementById('phase-label');
const $timerNumber   = document.getElementById('timer-number');
const $roundPill     = document.getElementById('round-pill');
const $repInfo       = document.getElementById('rep-info');
const $segments      = document.getElementById('segments');
const $progressBar   = document.getElementById('progress-bar');
const $btnStart      = document.getElementById('btn-start');
const $btnAgain      = document.getElementById('btn-again');
const $btnPause      = document.getElementById('btn-pause');
const $btnReset      = document.getElementById('btn-reset');
const $doneStats     = document.getElementById('done-stats');
const $pauseOverlay  = document.getElementById('pause-overlay');
const $estTime       = document.getElementById('est-time');
const $metaTheme     = document.getElementById('meta-theme');

// Build exercise segments
for (let i = 0; i < EXERCISES.length; i++) {
  const seg = document.createElement('div');
  seg.className = 'seg';
  seg.title = EXERCISES[i];
  $segments.appendChild(seg);
}
const segEls = $segments.querySelectorAll('.seg');

// Show estimated time
$estTime.textContent = '~' + formatTime(estimateTotal());

// ── State ───────────────────────────────────────────
let steps = [];
let cumulativeMs = null;
let totalDuration = 0;
let stepIndex = 0;
let timeLeft = 0;
let paused = false;
let running = false;
let lastTick = 0;
let rafId = null;
let startedAt = 0;
let lastTickSecond = -1;
let prevStepIndex = -1;
let isUrgent = false;

// ── Screens ─────────────────────────────────────────
function showScreen(screen) {
  $startScreen.style.display = 'none';
  $timerScreen.style.display = 'none';
  $doneScreen.style.display  = 'none';
  screen.style.display = 'flex';
}

function setThemeColor(state) {
  $metaTheme.setAttribute('content', THEME_COLORS[state] || '#111318');
}

// ── Render ──────────────────────────────────────────
function render() {
  const step = steps[stepIndex];
  if (!step) return;

  if (stepIndex !== prevStepIndex) {
    prevStepIndex = stepIndex;
    document.body.className = 'state-' + step.type;
    setThemeColor(step.type);
    isUrgent = false;
    $timerNumber.classList.remove('urgent');

    // Pop animation on number
    $timerNumber.classList.remove('pop');
    void $timerNumber.offsetWidth; // reflow to retrigger
    $timerNumber.classList.add('pop');

    // Exercise name
    if (step.type === 'rest') {
      $exerciseName.textContent = step.exercise;
    } else {
      $exerciseName.textContent = step.exercise;
    }

    // Phase label
    if (step.type === 'transition') {
      $phaseLabel.textContent = 'GET READY';
    } else if (step.type === 'work') {
      $phaseLabel.textContent = 'HOLD';
    } else {
      $phaseLabel.textContent = 'REST';
    }

    // Round pill
    $roundPill.textContent = `Round of ${step.round}`;

    // Rep info
    if (step.type === 'transition') {
      $repInfo.textContent = `${step.repTotal} reps coming up`;
    } else {
      $repInfo.textContent = `Rep ${step.rep} / ${step.repTotal}`;
    }

    // Segments
    for (let i = 0; i < segEls.length; i++) {
      segEls[i].className = 'seg';
      if (i < step.exIndex) segEls[i].classList.add('done');
      else if (i === step.exIndex) segEls[i].classList.add('active');
    }
  }

  // Timer number
  const secLeft = Math.ceil(timeLeft / 1000);
  $timerNumber.textContent = secLeft;

  // Urgency on last 3 seconds
  if (secLeft <= 3 && timeLeft > 0 && !isUrgent) {
    isUrgent = true;
    $timerNumber.classList.add('urgent');
  } else if (secLeft > 3 && isUrgent) {
    isUrgent = false;
    $timerNumber.classList.remove('urgent');
  }

  // Overall progress
  const overallElapsed = cumulativeMs[stepIndex] + (step.duration * 1000 - timeLeft);
  const pct = Math.min(100, (overallElapsed / totalDuration) * 100);
  $progressBar.style.width = pct + '%';
}

// ── Timer loop ──────────────────────────────────────
function tick(now) {
  if (!running) return;
  if (paused) {
    lastTick = now;
    rafId = requestAnimationFrame(tick);
    return;
  }

  const dt = now - lastTick;
  lastTick = now;
  timeLeft -= dt;

  const secLeft = Math.ceil(timeLeft / 1000);
  if (secLeft !== lastTickSecond && secLeft <= 3 && secLeft >= 1 && timeLeft > 0) {
    beepTick();
  }
  lastTickSecond = secLeft;

  while (timeLeft <= 0) {
    stepIndex++;
    if (stepIndex >= steps.length) {
      finish();
      return;
    }
    timeLeft += steps[stepIndex].duration * 1000;
    lastTickSecond = -1;
    onStepStart();
  }

  render();
  rafId = requestAnimationFrame(tick);
}

function onStepStart() {
  const step = steps[stepIndex];
  if (step.type === 'work') {
    beepWork();
    vibrate(200);
    speak(step.rep === 1 ? step.exercise : `${step.rep}`);
  } else if (step.type === 'rest') {
    beepRest();
    vibrate([100, 50, 100]);
    speak('Rest');
  } else if (step.type === 'transition') {
    beepTransition();
    vibrate([100, 80, 100, 80, 100]);
    speak(`${step.exercise}. Round of ${step.round}.`);
  }
}

function finish() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  document.body.className = 'state-done';
  setThemeColor('done');
  showScreen($doneScreen);

  const elapsed = Math.round((Date.now() - startedAt) / 1000);
  const holds = totalHolds();
  $doneStats.innerHTML = `${formatTime(elapsed)} total<br>${holds} holds completed`;

  beepDone();
  vibrate([200, 100, 200, 100, 400]);
  speak('Workout complete. Great job!');
  releaseWakeLock();
}

// ── Controls ────────────────────────────────────────
function togglePause() {
  paused = !paused;
  $btnPause.textContent = paused ? '▶' : '⏸';
  $pauseOverlay.className = paused ? 'visible' : '';
  if (paused) stopSpeech();
}

function startWorkout() {
  ensureAudio();
  steps = buildSteps();
  cumulativeMs = buildCumulativeMs(steps);
  totalDuration = cumulativeMs[steps.length];
  stepIndex = 0;
  prevStepIndex = -1;
  paused = false;
  running = true;
  startedAt = Date.now();

  showScreen($timerScreen);
  $btnPause.textContent = '⏸';
  $pauseOverlay.className = '';

  onStepStart();
  timeLeft = steps[0].duration * 1000;
  render();
  lastTick = performance.now();
  rafId = requestAnimationFrame(tick);
  requestWakeLock();
}

function resetToStart() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  stopSpeech();
  document.body.className = '';
  setThemeColor('');
  showScreen($startScreen);
  releaseWakeLock();
}

$btnStart.addEventListener('click', startWorkout);
$btnAgain.addEventListener('click', startWorkout);
$btnPause.addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });
$btnReset.addEventListener('click', (e) => { e.stopPropagation(); resetToStart(); });
$timerScreen.addEventListener('click', togglePause);

// ── Wake Lock ───────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  if (wakeLock) {
    wakeLock.release().catch(() => {});
    wakeLock = null;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* ignore */ }
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release().catch(() => {});
    wakeLock = null;
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running && !paused) requestWakeLock();
});
</script>
</body>
</html>
