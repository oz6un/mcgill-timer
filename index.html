<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>McGill Big 3 Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #1a1a2e;
    --fg: #f0f0f0;
    --accent: #4ecca3;
    --work-bg: #0a4a32;
    --work-fg: #4eff9e;
    --rest-bg: #4a3a0a;
    --rest-fg: #ffd04a;
    --trans-bg: #0a2a4a;
    --trans-fg: #4a9eff;
    --done-bg: #3a0a4a;
    --done-fg: #d04aff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: background 0.5s;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  body.state-work       { background: var(--work-bg); }
  body.state-rest       { background: var(--rest-bg); }
  body.state-transition { background: var(--trans-bg); }
  body.state-done       { background: var(--done-bg); }

  /* ── Start screen ──────────────────────────────── */
  #start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
    padding: 1.5rem;
  }

  h1 {
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.5px;
    text-align: center;
  }

  .subtitle {
    font-size: clamp(0.85rem, 2.5vw, 1rem);
    opacity: 0.5;
    margin-top: 0.25rem;
    text-align: center;
  }

  .config {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    font-size: clamp(0.8rem, 2.5vw, 0.95rem);
    opacity: 0.6;
    text-align: center;
    line-height: 1.6;
  }

  .big-btn {
    width: clamp(130px, 36vw, 170px);
    height: clamp(130px, 36vw, 170px);
    border-radius: 50%;
    border: 4px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-size: clamp(1.3rem, 4vw, 1.7rem);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 2px;
  }

  .big-btn:active {
    transform: scale(0.93);
    background: var(--accent);
    color: var(--bg);
  }

  /* ── Timer screen ──────────────────────────────── */
  #timer-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 1rem 1rem 0;
    position: relative;
    cursor: pointer;
    gap: 0;
  }

  /* Phase label — THE most visible element after the number */
  #phase-label {
    font-size: clamp(1.2rem, 4.5vw, 1.6rem);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 6px;
    transition: color 0.4s;
    margin-bottom: 0.3rem;
  }

  body.state-work #phase-label       { color: var(--work-fg); }
  body.state-rest #phase-label       { color: var(--rest-fg); }
  body.state-transition #phase-label { color: var(--trans-fg); }

  /* Exercise name */
  #exercise-name {
    font-size: clamp(1.5rem, 5.5vw, 2.2rem);
    font-weight: 700;
    text-align: center;
    min-height: 2.5rem;
    margin-bottom: 0.5rem;
  }

  /* Ring */
  .timer-ring-wrap {
    position: relative;
    width: clamp(180px, 52vw, 280px);
    height: clamp(180px, 52vw, 280px);
    flex-shrink: 0;
  }

  .timer-ring-wrap svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }

  .ring-bg {
    fill: none;
    stroke: rgba(255,255,255,0.08);
    stroke-width: 8;
  }

  .ring-fg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 8;
    stroke-linecap: round;
    transition: stroke 0.4s;
  }

  body.state-work .ring-fg       { stroke: var(--work-fg); }
  body.state-rest .ring-fg       { stroke: var(--rest-fg); }
  body.state-transition .ring-fg { stroke: var(--trans-fg); }
  body.state-done .ring-fg       { stroke: var(--done-fg); }

  #timer-number {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(3.5rem, 14vw, 5.5rem);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  /* Info bar under the ring */
  #info-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-top: 0.6rem;
    font-size: clamp(0.8rem, 2.8vw, 1rem);
    opacity: 0.6;
    min-height: 1.5rem;
  }

  #info-bar span {
    white-space: nowrap;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.4;
  }

  /* Exercise dots — shows position within cycle */
  #exercise-dots {
    display: flex;
    gap: 6px;
    align-items: center;
    justify-content: center;
    margin-top: 0.7rem;
    min-height: 1.2rem;
  }

  .ex-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: all 0.3s;
  }

  .ex-dot.active {
    width: 10px;
    height: 10px;
    background: var(--accent);
  }

  .ex-dot.done {
    background: rgba(255,255,255,0.5);
  }

  body.state-work .ex-dot.active       { background: var(--work-fg); }
  body.state-rest .ex-dot.active       { background: var(--rest-fg); }
  body.state-transition .ex-dot.active { background: var(--trans-fg); }

  /* Controls */
  .controls {
    display: flex;
    gap: 1.2rem;
    margin-top: 0.8rem;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--fg);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    font-size: 1.2rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }

  .ctrl-btn:active { background: rgba(255,255,255,0.2); }

  /* Pause overlay */
  #pause-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
    align-items: center;
    justify-content: center;
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 700;
    letter-spacing: 4px;
    z-index: 10;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  #pause-overlay.visible { display: flex; }

  /* Progress bar */
  #progress-wrap {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 5px;
    background: rgba(255,255,255,0.06);
  }

  #progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s, background 0.4s;
  }

  body.state-work #progress-bar       { background: var(--work-fg); }
  body.state-rest #progress-bar       { background: var(--rest-fg); }
  body.state-transition #progress-bar { background: var(--trans-fg); }
  body.state-done #progress-bar       { background: var(--done-fg); }

  /* ── Done screen ───────────────────────────────── */
  #done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 1.5rem;
  }

  #done-msg {
    font-size: clamp(1.8rem, 6vw, 2.5rem);
    font-weight: 800;
    text-align: center;
    color: var(--done-fg);
  }

  .total-time {
    font-size: clamp(0.9rem, 3vw, 1.1rem);
    opacity: 0.6;
    margin-top: 0.5rem;
    color: var(--fg);
  }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <div>
    <h1>McGill Big 3</h1>
    <div class="subtitle">Pyramid Timer</div>
  </div>
  <div class="config">
    <div>Curl-up · Side Plank L/R · Bird Dog L/R</div>
    <div>10s hold · 5s rest</div>
    <div>6 reps → 4 reps → 2 reps per exercise</div>
    <div id="est-time"></div>
  </div>
  <button class="big-btn" id="btn-start">START</button>
</div>

<!-- Timer Screen -->
<div id="timer-screen">
  <div id="phase-label"></div>
  <div id="exercise-name"></div>

  <div class="timer-ring-wrap">
    <svg viewBox="0 0 240 240">
      <circle class="ring-bg" cx="120" cy="120" r="104"/>
      <circle class="ring-fg" id="ring" cx="120" cy="120" r="104"/>
    </svg>
    <div id="timer-number">0</div>
  </div>

  <div id="exercise-dots"></div>

  <div id="info-bar">
    <span id="set-info"></span>
    <div class="dot"></div>
    <span id="cycle-info"></span>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="btn-pause" title="Pause / Resume">⏸</button>
    <button class="ctrl-btn" id="btn-reset" title="Reset">⏹</button>
  </div>

  <div id="pause-overlay">PAUSED</div>

  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>
</div>

<!-- Done Screen -->
<div id="done-screen">
  <div id="done-msg">
    Done!
    <div class="total-time" id="total-time"></div>
  </div>
  <button class="big-btn" id="btn-again">AGAIN</button>
</div>

<script>
// ── Config ──────────────────────────────────────────
const EXERCISES = [
  'Curl-up',
  'Side Plank (Left)',
  'Side Plank (Right)',
  'Bird Dog (Left)',
  'Bird Dog (Right)',
];
const SETS = [6, 4, 2];
const WORK_SEC = 10;
const REST_SEC = 5;
const TRANSITION_SEC = 10;

// ── Build step list ─────────────────────────────────
// For each round (6, 4, 2): do each exercise N times before moving
// to the next exercise. Transition between exercises, rest between reps.
function buildSteps() {
  const steps = [];
  const lastRound = SETS.length - 1;

  for (let si = 0; si < SETS.length; si++) {
    const repCount = SETS[si];

    for (let ei = 0; ei < EXERCISES.length; ei++) {
      const ex = EXERCISES[ei];

      // Transition before each exercise
      steps.push({
        type: 'transition', duration: TRANSITION_SEC,
        exercise: ex, round: repCount, rep: 1, repTotal: repCount, exIndex: ei,
      });

      for (let r = 1; r <= repCount; r++) {
        // Work
        steps.push({
          type: 'work', duration: WORK_SEC,
          exercise: ex, round: repCount, rep: r, repTotal: repCount, exIndex: ei,
        });

        // Rest after every rep except the last rep of this exercise
        if (r < repCount) {
          steps.push({
            type: 'rest', duration: REST_SEC,
            exercise: ex, round: repCount, rep: r, repTotal: repCount, exIndex: ei,
          });
        }
      }
    }
  }
  return steps;
}

function buildCumulativeMs(steps) {
  const cum = new Float64Array(steps.length + 1);
  for (let i = 0; i < steps.length; i++) {
    cum[i + 1] = cum[i] + steps[i].duration * 1000;
  }
  return cum;
}

function estimateTotalTime() {
  const s = buildSteps();
  const ms = s.reduce((sum, step) => sum + step.duration * 1000, 0);
  const sec = Math.round(ms / 1000);
  const m = Math.floor(sec / 60);
  const r = sec % 60;
  return `~${m}:${String(r).padStart(2, '0')} total`;
}

// ── Audio ───────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function beep(freq, duration, vol = 0.3) {
  ensureAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = freq;
  osc.type = 'sine';
  gain.gain.value = vol;
  gain.gain.setTargetAtTime(0, audioCtx.currentTime + duration / 1000 * 0.8, 0.015);
  osc.start();
  osc.stop(audioCtx.currentTime + duration / 1000);
}

function beepWork()       { beep(880, 200, 0.35); }
function beepRest()       { beep(440, 200, 0.25); }
function beepTick()       { beep(1000, 60, 0.15); }
function beepTransition() {
  beep(523, 150, 0.3);
  setTimeout(() => beep(659, 150, 0.3), 180);
  setTimeout(() => beep(784, 200, 0.3), 360);
}
function beepDone() {
  beep(784, 200, 0.3);
  setTimeout(() => beep(988, 200, 0.3), 220);
  setTimeout(() => beep(1175, 300, 0.35), 440);
}

// ── Vibration ───────────────────────────────────────
function vibrate(pattern) {
  if ('vibrate' in navigator) navigator.vibrate(pattern);
}

// ── Speech ──────────────────────────────────────────
function speak(text) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 1.1;
    u.volume = 1;
    speechSynthesis.speak(u);
  }
}

function stopSpeech() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
}

// ── DOM refs ────────────────────────────────────────
const $startScreen   = document.getElementById('start-screen');
const $timerScreen   = document.getElementById('timer-screen');
const $doneScreen    = document.getElementById('done-screen');
const $exerciseName  = document.getElementById('exercise-name');
const $phaseLabel    = document.getElementById('phase-label');
const $timerNumber   = document.getElementById('timer-number');
const $setInfo       = document.getElementById('set-info');
const $cycleInfo     = document.getElementById('cycle-info');
const $exerciseDots  = document.getElementById('exercise-dots');
const $ring          = document.getElementById('ring');
const $progressBar   = document.getElementById('progress-bar');
const $btnStart      = document.getElementById('btn-start');
const $btnAgain      = document.getElementById('btn-again');
const $btnPause      = document.getElementById('btn-pause');
const $btnReset      = document.getElementById('btn-reset');
const $totalTime     = document.getElementById('total-time');
const $pauseOverlay  = document.getElementById('pause-overlay');
const $estTime       = document.getElementById('est-time');

const RING_R = 104;
const RING_CIRCUMFERENCE = 2 * Math.PI * RING_R;
$ring.setAttribute('stroke-dasharray', RING_CIRCUMFERENCE);
$ring.setAttribute('stroke-dashoffset', '0');

// Show estimated time on start screen
$estTime.textContent = estimateTotalTime();

// Build exercise dots
for (let i = 0; i < EXERCISES.length; i++) {
  const dot = document.createElement('div');
  dot.className = 'ex-dot';
  dot.title = EXERCISES[i];
  $exerciseDots.appendChild(dot);
}
const exDotEls = $exerciseDots.querySelectorAll('.ex-dot');

// ── State ───────────────────────────────────────────
let steps = [];
let cumulativeMs = null;
let totalDuration = 0;
let stepIndex = 0;
let timeLeft = 0;
let paused = false;
let running = false;
let lastTick = 0;
let rafId = null;
let startedAt = 0;
let lastTickSecond = -1;
let prevStepIndex = -1;

// ── Screen management ───────────────────────────────
function showScreen(screen) {
  $startScreen.style.display = 'none';
  $timerScreen.style.display = 'none';
  $doneScreen.style.display  = 'none';
  screen.style.display = 'flex';
}

// ── Render ──────────────────────────────────────────
function render() {
  const step = steps[stepIndex];
  if (!step) return;

  if (stepIndex !== prevStepIndex) {
    prevStepIndex = stepIndex;
    document.body.className = 'state-' + step.type;

    // Phase label + exercise name
    if (step.type === 'transition') {
      $phaseLabel.textContent = 'GET READY';
      $exerciseName.textContent = step.exercise;
    } else if (step.type === 'work') {
      $phaseLabel.textContent = 'HOLD';
      $exerciseName.textContent = step.exercise;
    } else {
      $phaseLabel.textContent = 'REST';
      $exerciseName.textContent = step.exercise;
    }

    // Info bar
    $setInfo.textContent = `Round of ${step.round}`;
    $cycleInfo.textContent = `Rep ${step.rep} / ${step.repTotal}`;

    // Exercise dots
    for (let i = 0; i < exDotEls.length; i++) {
      exDotEls[i].className = 'ex-dot';
      if (i < step.exIndex) exDotEls[i].classList.add('done');
      else if (i === step.exIndex) exDotEls[i].classList.add('active');
    }
  }

  const secLeft = Math.ceil(timeLeft / 1000);
  $timerNumber.textContent = secLeft;

  const frac = 1 - (timeLeft / (step.duration * 1000));
  $ring.style.strokeDashoffset = RING_CIRCUMFERENCE * frac;

  const overallElapsed = cumulativeMs[stepIndex] + (step.duration * 1000 - timeLeft);
  const pct = Math.min(100, (overallElapsed / totalDuration) * 100);
  $progressBar.style.width = pct + '%';
}

// ── Timer loop ──────────────────────────────────────
function tick(now) {
  if (!running) return;
  if (paused) {
    lastTick = now;
    rafId = requestAnimationFrame(tick);
    return;
  }

  const dt = now - lastTick;
  lastTick = now;
  timeLeft -= dt;

  const secLeft = Math.ceil(timeLeft / 1000);
  if (secLeft !== lastTickSecond && secLeft <= 3 && secLeft >= 1 && timeLeft > 0) {
    beepTick();
  }
  lastTickSecond = secLeft;

  while (timeLeft <= 0) {
    stepIndex++;
    if (stepIndex >= steps.length) {
      finish();
      return;
    }
    timeLeft += steps[stepIndex].duration * 1000;
    lastTickSecond = -1;
    onStepStart();
  }

  render();
  rafId = requestAnimationFrame(tick);
}

function onStepStart() {
  const step = steps[stepIndex];

  if (step.type === 'work') {
    beepWork();
    vibrate(200);
    speak(step.rep === 1 ? step.exercise : `${step.rep}`);
  } else if (step.type === 'rest') {
    beepRest();
    vibrate([100, 50, 100]);
    speak('Rest');
  } else if (step.type === 'transition') {
    beepTransition();
    vibrate([100, 80, 100, 80, 100]);
    speak(`${step.exercise}. Round of ${step.round}.`);
  }
}

function finish() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  document.body.className = 'state-done';
  showScreen($doneScreen);

  const elapsed = Math.round((Date.now() - startedAt) / 1000);
  const m = Math.floor(elapsed / 60);
  const s = elapsed % 60;
  $totalTime.textContent = `${m}:${String(s).padStart(2, '0')} total`;

  beepDone();
  vibrate([200, 100, 200, 100, 400]);
  speak('Workout complete. Great job!');
  releaseWakeLock();
}

// ── Controls ────────────────────────────────────────
function togglePause() {
  paused = !paused;
  $btnPause.textContent = paused ? '▶' : '⏸';
  $pauseOverlay.className = paused ? 'visible' : '';
  if (paused) stopSpeech();
}

function startWorkout() {
  ensureAudio();
  steps = buildSteps();
  cumulativeMs = buildCumulativeMs(steps);
  totalDuration = cumulativeMs[steps.length];
  stepIndex = 0;
  prevStepIndex = -1;
  paused = false;
  running = true;
  startedAt = Date.now();

  showScreen($timerScreen);
  $btnPause.textContent = '⏸';
  $pauseOverlay.className = '';

  onStepStart();
  timeLeft = steps[0].duration * 1000;
  render();
  lastTick = performance.now();
  rafId = requestAnimationFrame(tick);
  requestWakeLock();
}

function resetToStart() {
  running = false;
  if (rafId) cancelAnimationFrame(rafId);
  stopSpeech();
  document.body.className = '';
  showScreen($startScreen);
  releaseWakeLock();
}

$btnStart.addEventListener('click', startWorkout);
$btnAgain.addEventListener('click', startWorkout);
$btnPause.addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });
$btnReset.addEventListener('click', (e) => { e.stopPropagation(); resetToStart(); });

// Tap anywhere on timer screen to pause/resume
$timerScreen.addEventListener('click', togglePause);

// ── Wake Lock ───────────────────────────────────────
let wakeLock = null;

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  if (wakeLock) {
    wakeLock.release().catch(() => {});
    wakeLock = null;
  }
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* ignore */ }
}

function releaseWakeLock() {
  if (wakeLock) {
    wakeLock.release().catch(() => {});
    wakeLock = null;
  }
}

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && running && !paused) requestWakeLock();
});
</script>
</body>
</html>
